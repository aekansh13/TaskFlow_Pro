<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro — Sign In</title>
  <meta name="description" content="TaskFlow Pro: Sign in or create an account to organize, prioritize, and achieve your goals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F3FF;
      --surface: #FFFFFF;
      --text: #0F172A;
      --muted: #64748B;
      --brand: #8B5CF6; 
      --brand-hover: #7C3AED;
      --danger: #EF4444;
      --danger-bg: #FEF2F2;
      --border-color: #0F172A;
      --shadow-color: #0F172A;
      --radius: 16px;
      --border-w: 3px;
    }

    body.dark {
      --bg: #0F111A;
      --surface: #1B1E28;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --border-color: #334155;
      --shadow-color: #000000;
      --danger-bg: #450A0A;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      transition: background 0.3s;
    }

    /* Abstract Gamified Background */
    .bg-pattern {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(var(--border-color) 1.5px, transparent 1.5px);
      background-size: 32px 32px;
      opacity: 0.12;
      z-index: 0;
      animation: panBg 40s linear infinite;
    }
    body.dark .bg-pattern { opacity: 0.3; }

    @keyframes panBg { from { background-position: 0 0; } to { background-position: 100% 100%; } }

    .theme-toggle {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      z-index: 10;
      background: var(--surface);
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      padding: 0.6rem 1.2rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--shadow-color);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .theme-toggle:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0 var(--shadow-color);
    }

    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
    }

    .auth-card {
      background: var(--surface);
      border: var(--border-w) solid var(--border-color);
      border-radius: var(--radius);
      padding: 2.5rem 2.5rem;
      box-shadow: 10px 10px 0 var(--shadow-color);
      transition: box-shadow 0.3s, background 0.3s;
    }

    .brand-header { text-align: center; margin-bottom: 2rem; }
    .logo-mask {
      display: inline-block;
      mask-image: url('img/logo.png');
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      -webkit-mask-image: url('img/logo.png');
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
    }

    .brand-logo {
      background: var(--brand);
      display: inline-flex; align-items: center; justify-content: center;
      width: 70px; height: 70px;
      border-radius: 16px;
      border: var(--border-w) solid var(--border-color);
      transform: rotate(-5deg);
      box-shadow: 4px 4px 0 var(--shadow-color);
      margin-bottom: 1rem;
    }
    .brand-logo .logo-mask {
      width: 45px; height: 45px;
      background-color: #fff;
    }
    .brand-header h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.5px; }
    .brand-header p { color: var(--muted); font-size: 1rem; font-weight: 500; margin-top: 0.5rem; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.8rem;
      background: var(--bg);
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--shadow-color);
      transition: all 0.1s;
    }
    .tab-btn.active {
      background: var(--brand);
      color: #FFF;
      box-shadow: 0px 0px 0 var(--shadow-color);
      transform: translate(3px, 3px);
    }

    /* Form */
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); margin-bottom: 0.5rem; }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    input:focus {
      outline: none;
      box-shadow: 4px 4px 0 var(--brand);
      transform: translate(-2px, -2px);
    }

    .error-box {
      background: var(--danger-bg);
      border: var(--border-w) solid var(--danger);
      border-radius: 12px;
      padding: 1rem;
      color: var(--danger);
      font-weight: 800;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      box-shadow: 4px 4px 0 var(--danger);
    }

    /* Chunky Button */
    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: var(--brand);
      color: #fff;
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 4px 4px 0 var(--shadow-color);
      transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-top: 2rem;
    }
    .btn-primary:active:not(:disabled) {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0 var(--shadow-color);
    }
    .btn-primary:hover:not(:disabled) { background: var(--brand-hover); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.75rem 0;
      color: var(--muted); font-size: 0.85rem; font-weight: 800; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: var(--border-w); background: var(--border-color);
    }

    .btn-google {
      width: 100%;
      padding: 0.9rem;
      background: var(--surface);
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      box-shadow: 4px 4px 0 var(--shadow-color);
      transition: transform 0.1s, box-shadow 0.1s;
      color: var(--text);
    }
    .btn-google:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0 var(--shadow-color);
    }
    .google-icon { width: 22px; height: 22px; }

    .spin {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="authApp()" x-init="init()" :class="{ dark: darkMode }">

  <button class="theme-toggle" @click="toggleDark()">
    <span x-text="darkMode ? '☀️ Light' : '🌙 Dark'"></span>
  </button>

  <div class="bg-pattern"></div>

  <div class="auth-container">
    <div class="auth-card">
      
      <div class="brand-header">
        <div class="brand-logo"><div class="logo-mask"></div></div>
        <h1>TaskFlow Pro</h1>
        <p x-text="activeTab === 'login' ? 'Ready to crush it today?' : 'Level up your productivity'"></p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn" :class="{active: activeTab === 'login'}" @click="activeTab = 'login'; error = ''">Log In</button>
        <button class="tab-btn" :class="{active: activeTab === 'register'}" @click="activeTab = 'register'; error = ''">Sign Up</button>
      </div>

      <!-- Error box -->
      <div class="error-box" x-show="error" x-cloak x-text="error"></div>

      <!-- Login Form -->
      <form x-show="activeTab === 'login'" @submit.prevent="handleLogin()">
        <div class="form-group">
          <label>Email ID</label>
          <input type="email" x-model="loginEmail" placeholder="player@one.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" x-model="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" :disabled="loading">
          <span class="spin" x-show="loading" x-cloak></span>
          <span x-text="loading ? 'Entering...' : 'Start Game'"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form x-show="activeTab === 'register'" @submit.prevent="handleRegister()" x-cloak>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" x-model="regName" placeholder="Player One" :required="activeTab === 'register'" />
        </div>
        <div class="form-group">
          <label>Email ID</label>
          <input type="email" x-model="regEmail" placeholder="player@one.com" :required="activeTab === 'register'" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" x-model="regPassword" placeholder="Min 8 chars, 1 upper, 1 digit" :required="activeTab === 'register'" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" x-model="regConfirm" placeholder="Repeat password" :required="activeTab === 'register'" />
        </div>
        <button type="submit" class="btn-primary" :disabled="loading">
          <span class="spin" x-show="loading" x-cloak></span>
          <span x-text="loading ? 'Creating...' : 'Create Account'"></span>
        </button>
      </form>

      <!-- Google OAuth -->
      <div class="divider">or quick join</div>
      <button class="btn-google" @click="googleLogin()" type="button">
        <svg class="google-icon" viewBox="0 0 48 48"><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.3 5.5-4.9 7.2v6h7.9c4.6-4.3 7.2-10.6 7.2-17.5z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.9-6c-2.1 1.4-4.8 2.2-8 2.2-6.1 0-11.3-4.1-13.2-9.7H2.6v6.2C6.5 42.7 14.6 48 24 48z"/><path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 10.3 24c0-1.6.3-3.2.7-4.7v-6.2H2.6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l8.2-6z"/><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.9 2.4 30.5 0 24 0 14.6 0 6.5 5.3 2.6 13.3l8.2 6.2C12.7 13.7 17.9 9.5 24 9.5z"/></svg>
        Sign in with Google
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <!-- Module MUST come before Alpine so window.authApp is defined when Alpine boots -->
  <script type="module">
    import { auth, BASE_URL } from './js/api.js';

    document.addEventListener('alpine:init', () => {
      Alpine.data('authApp', () => ({
        activeTab: 'login',
        loading: false,
        error: '',
        darkMode: false,
        loginEmail: '', loginPassword: '',
        regName: '', regEmail: '', regPassword: '', regConfirm: '',

        async init() {
          // Initialize theme preference
          this.darkMode = localStorage.getItem('theme') === 'dark';
          
          const params = new URLSearchParams(window.location.search);
          if (params.get('error') === 'oauth_failed') {
            this.error = 'Google sign-in failed. Please try again.';
          }
          const res = await auth.me();
          if (res?.ok) window.location.href = 'dashboard.html';
        },

        toggleDark() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
        },

        async handleLogin() {
          this.error = '';
          if (!this.loginEmail || !this.loginPassword) { this.error = 'All fields are required.'; return; }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.loginEmail)) { this.error = 'Enter a valid email address.'; return; }
          this.loading = true;
          const res = await auth.login(this.loginEmail, this.loginPassword);
          this.loading = false;
          if (res?.ok) { 
            window.location.href = 'dashboard.html'; 
          } else { 
            let errMsg = res?.data?.error;
            if (!errMsg && res?.data?.errors) {
              errMsg = Object.values(res.data.errors).flat().join(' ');
            }
            this.error = errMsg || 'Login failed. Please try again.'; 
          }
        },

        async handleRegister() {
          this.error = '';
          if (!this.regName || !this.regEmail || !this.regPassword || !this.regConfirm) { this.error = 'All fields are required.'; return; }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.regEmail)) { this.error = 'Enter a valid email address.'; return; }
          if (this.regPassword.length < 8) { this.error = 'Password must be at least 8 characters.'; return; }
          if (this.regPassword !== this.regConfirm) { this.error = 'Passwords do not match.'; return; }
          this.loading = true;
          const res = await auth.register(this.regName, this.regEmail, this.regPassword);
          this.loading = false;
          if (res?.ok) { 
            window.location.href = 'dashboard.html'; 
          } else { 
            let errMsg = res?.data?.error;
            if (!errMsg && res?.data?.errors) {
              errMsg = Object.values(res.data.errors).flat().join(' ');
            }
            this.error = errMsg || 'Registration failed. Please try again.'; 
          }
        },

        googleLogin() {
          window.location.href = BASE_URL + '/api/auth/google';
        }
      }));
    });
  </script>
  <!-- Alpine loads AFTER the module so the alpine:init listener is already registered -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
