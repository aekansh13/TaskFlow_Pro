<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro — Calendar</title>
  <meta name="description" content="TaskFlow Pro calendar view. Visualise and reschedule tasks by date." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F5F3FF;
      --surface: #FFFFFF;
      --surface2: #F8FAFC;
      --text: #0F172A;
      --muted: #64748B;
      --brand: #8B5CF6;
      --brand-hover: #7C3AED;
      --danger: #EF4444;
      --danger-bg: #FEF2F2;
      --success: #10B981;
      --warning: #F59E0B;
      --border-color: #0F172A;
      --shadow-color: #0F172A;
      --radius: 16px;
      --border-w: 3px;
      --sidebar-w: 240px;
    }

    body.dark {
      --bg: #0F111A;
      --surface: #1B1E28;
      --surface2: #242838;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --border-color: #334155;
      --shadow-color: #000000;
      --danger-bg: #450A0A;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .3s, color .3s;
    }

    /* Gamified Background */
    .bg-pattern {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: radial-gradient(var(--border-color) 1.5px, transparent 1.5px);
      background-size: 32px 32px;
      opacity: 0.08;
      z-index: 0;
      pointer-events: none;
      animation: panBg 40s linear infinite;
    }

    body.dark .bg-pattern {
      opacity: 0.2;
    }

    @keyframes panBg {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 100% 100%;
      }
    }

    /* ---------- Navbar ---------- */
    .navbar {
      height: 70px;
      background: var(--surface);
      border-bottom: var(--border-w) solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 0 var(--shadow-color);
    }

    .nav-logo {
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .logo-mask {
      display: inline-block;
      mask-image: url('img/logo.png');
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      -webkit-mask-image: url('img/logo.png');
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
    }

    .nav-logo .logo-mask {
      width: 36px; height: 36px;
      background-color: var(--brand);
    }

    .nav-spacer {
      flex: 1;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: var(--border-w) solid var(--border-color);
      background: var(--brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      flex-shrink: 0;
      box-shadow: 2px 2px 0 var(--shadow-color);
    }

    .btn-icon-nav {
      background: var(--bg);
      border: var(--border-w) solid var(--border-color);
      border-radius: 10px;
      padding: .4rem .8rem;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 700;
      color: var(--text);
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 2px 2px 0 var(--shadow-color);
      text-transform: uppercase;
    }

    .btn-icon-nav:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--shadow-color);
    }

    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: var(--border-w) solid var(--border-color);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      z-index: 10;
      transition: width 0.2s ease, padding 0.2s ease;
      overflow-x: hidden;
      white-space: nowrap;
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 1.5rem 0.5rem;
    }

    .sidebar.collapsed .sidebar-label-text,
    .sidebar.collapsed .nav-text {
      display: none;
    }

    .sidebar.collapsed .sidebar-label {
      justify-content: center !important;
      padding: 0;
    }

    .sidebar.collapsed .nav-link {
      justify-content: center;
      padding: 0.8rem 0;
      gap: 0;
    }

    .btn-collapse {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--brand);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .btn-collapse:hover {
      color: var(--text);
    }

    .sidebar.collapsed .btn-collapse {
      transform: rotate(180deg);
    }

    .sidebar-label {
      font-size: .75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding: 0 .5rem;
      margin: 1rem 0 .5rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
      transition: all .15s;
      border: var(--border-w) solid transparent;
    }

    .nav-link:hover {
      color: var(--text);
      border-color: var(--border-color);
      background: var(--bg);
      transform: translateX(4px);
      box-shadow: 2px 2px 0 var(--shadow-color);
    }

    .nav-link.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--border-color);
      box-shadow: 3px 3px 0 var(--shadow-color);
    }

    .main {
      flex: 1;
      overflow: hidden;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .main h1 {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 1.5rem;
      letter-spacing: -0.5px;
    }

    /* Gamified FullCalendar overrides */
    #calendar {
      flex: 1;
      background: var(--surface);
      border: var(--border-w) solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 8px 8px 0 var(--shadow-color);
    }

    .fc-toolbar-title {
      font-size: 1.4rem !important;
      font-weight: 900 !important;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: var(--border-color) !important;
      border-width: 2px !important;
    }

    .fc-col-header-cell {
      background: var(--surface2) !important;
      border-bottom: var(--border-w) solid var(--border-color) !important;
      padding: 0.75rem 0 !important;
    }

    .fc-col-header-cell-cushion {
      font-weight: 800 !important;
      text-transform: uppercase;
      font-size: 0.85rem !important;
      color: var(--text) !important;
      text-decoration: none !important;
    }

    .fc-daygrid-day-number {
      font-weight: 700;
      color: var(--text);
      text-decoration: none !important;
      padding: 8px !important;
    }

    .fc-button {
      background: var(--brand) !important;
      border: 2px solid var(--border-color) !important;
      font-family: inherit !important;
      font-size: .85rem !important;
      font-weight: 800 !important;
      box-shadow: 3px 3px 0 var(--shadow-color) !important;
      color: #FFF !important;
      text-transform: uppercase;
      border-radius: 8px !important;
      padding: 0.5rem 1rem !important;
      transition: transform 0.1s, box-shadow 0.1s !important;
      text-shadow: none !important;
    }

    .fc-button:hover {
      background: var(--brand-hover) !important;
    }

    .fc-button:active {
      transform: translate(3px, 3px) !important;
      box-shadow: 0 0 0 var(--shadow-color) !important;
    }

    .fc-daygrid-event {
      border: 2px solid var(--border-color) !important;
      border-radius: 8px !important;
      font-size: 0.8rem !important;
      padding: 0.2rem 0.4rem !important;
      box-shadow: 2px 2px 0 var(--shadow-color) !important;
      cursor: pointer;
      margin-top: 4px !important;
    }

    .fc-event-title {
      font-weight: 800 !important;
    }

    /* Popup */
    .event-popup {
      position: fixed;
      background: var(--bg);
      border: var(--border-w) solid var(--border-color);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      box-shadow: 8px 8px 0 var(--shadow-color);
      z-index: 500;
      min-width: 260px;
      max-width: 320px;
      transition: transform 0.2s, opacity 0.2s;
    }

    .popup-title {
      font-weight: 900;
      margin-bottom: .5rem;
      font-size: 1.1rem;
      line-height: 1.2;
    }

    .popup-meta {
      font-size: .85rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .btn-sm {
      padding: .5rem 1rem;
      border-radius: 10px;
      font-size: .85rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      border: var(--border-w) solid var(--border-color);
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 2px 2px 0 var(--shadow-color);
    }

    .btn-sm:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--shadow-color);
    }

    .btn-sm-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-sm-secondary {
      background: var(--surface);
      color: var(--text);
      margin-right: .5rem;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      padding: .6rem 1.25rem;
      font-size: 1rem;
      font-weight: 800;
      box-shadow: 3px 3px 0 var(--shadow-color);
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
    }
    .btn-primary:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--shadow-color);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      padding: .6rem 1.25rem;
      font-size: 1rem;
      font-weight: 800;
      box-shadow: 3px 3px 0 var(--shadow-color);
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-ghost:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--shadow-color);
    }

    /* Quick-add modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
    }

    .modal {
      background: var(--bg);
      border: var(--border-w) solid var(--border-color);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      box-shadow: 12px 12px 0 var(--shadow-color);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: var(--border-w) solid var(--border-color);
      background: var(--surface);
    }

    .modal-header h2 {
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .close-btn {
      background: var(--danger-bg);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 900;
      padding: 0.2rem 0.7rem;
      cursor: pointer;
      color: var(--danger);
      box-shadow: 2px 2px 0 var(--shadow-color);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .close-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--shadow-color);
    }

    .modal-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .modal-footer {
      padding: 1.5rem;
      border-top: var(--border-w) solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      background: var(--surface);
    }

    .form-label {
      font-size: .85rem;
      font-weight: 800;
      text-transform: uppercase;
      display: block;
      margin-bottom: .4rem;
      letter-spacing: .05em;
    }

    .form-input {
      width: 100%;
      padding: .8rem 1rem;
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      background: var(--surface);
      color: var(--text);
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 2px 2px 0 transparent;
    }

    .form-input:focus {
      outline: none;
      box-shadow: 4px 4px 0 var(--brand);
      transform: translate(-2px, -2px);
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      padding: .7rem 1.2rem;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 3px 3px 0 var(--shadow-color);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-primary:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--shadow-color);
    }

    .btn-secondary {
      background: var(--surface);
      border: var(--border-w) solid var(--border-color);
      border-radius: 12px;
      padding: .7rem 1.2rem;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      box-shadow: 3px 3px 0 var(--shadow-color);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-secondary:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--shadow-color);
    }

    [x-cloak] {
      display: none !important;
    }

    @media (max-width:768px) {
      .sidebar {
        display: none;
      }

      .main {
        padding: 1rem;
      }

      #calendar {
        padding: 0.5rem;
      }
    }
  </style>
</head>

<body x-data="calendarApp()" x-init="init()" :class="{ dark: darkMode }">

  <div class="bg-pattern"></div>

  <nav class="navbar">
    <a class="nav-logo" href="dashboard.html"> <div class="logo-mask"></div> TaskFlow Pro</a>
    <div class="nav-spacer"></div>
    <div class="nav-user" x-data="{ settingsOpen: false }">
      <template x-if="user?.avatar_url">
        <img :src="user.avatar_url" class="avatar" style="object-fit: cover;" alt="Profile" />
      </template>
      <template x-if="!user?.avatar_url">
        <div class="avatar" x-text="user?.name?.[0]?.toUpperCase() || '?'"></div>
      </template>
      <span x-text="user?.name || ''" style="display:none; @media(min-width:600px){display:block;}"></span>

      <div style="position: relative; display: flex; align-items: center;">
        <button class="btn-icon-nav" @click="settingsOpen = !settingsOpen" title="Settings"
          style="display: flex; align-items: center; justify-content: center; padding: 0.4rem; cursor: pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" style="display: block;">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>

        <div x-show="settingsOpen" @click.away="settingsOpen = false" x-transition.opacity.duration.200ms
          style="display: none; position: absolute; right: 0; top: calc(100% + 0.5rem); background: var(--surface); border: var(--border-w) solid var(--border-color); border-radius: 12px; padding: 0.5rem; min-width: 170px; box-shadow: 4px 4px 0 var(--shadow-color); z-index: 9999; flex-direction: column; gap: 0.25rem;">

          <button @click="toggleDark(); settingsOpen = false"
            style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; width: 100%; justify-content: flex-start; padding: 0.5rem 0.75rem; color: var(--text); font-family: inherit; font-weight: 800; font-size: 0.85rem; text-transform: uppercase;">
            <svg x-show="!darkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg x-show="darkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <span x-text="darkMode ? 'Light Theme' : 'Dark Theme'"
              style="line-height: 1; transform: translateY(1px);"></span>
          </button>

          <div style="height: 3px; background: var(--border-color); margin: 0.25rem 0; width: 100%;"></div>

          <button @click="$dispatch('open-logout-modal'); settingsOpen = false"
            style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; width: 100%; justify-content: flex-start; color: var(--danger); padding: 0.5rem 0.75rem; font-family: inherit; font-weight: 800; font-size: 0.85rem; text-transform: uppercase;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span style="line-height: 1; transform: translateY(1px);">Exit App</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="app-body">
    <aside class="sidebar" x-data="{ sidebarOpen: localStorage.getItem('sidebarOpen') !== 'false' }"
      :class="sidebarOpen ? '' : 'collapsed'">
      <div class="sidebar-label" style="display:flex; justify-content:space-between; align-items:center;">
        <span class="sidebar-label-text">Navigation</span>
        <button class="btn-collapse"
          @click="sidebarOpen = !sidebarOpen; localStorage.setItem('sidebarOpen', sidebarOpen)" title="Toggle Sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
      <a class="nav-link" href="dashboard.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>

          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>

        <span class="nav-text">Calendar</span>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>

    <main class="main">
      <h1>My Timeline</h1>
      <div id="calendar"></div>
    </main>
  </div>

  <!-- Event popup -->
  <div class="event-popup" x-show="popup.visible" x-cloak x-transition :style="`top:${popup.y}px; left:${popup.x}px`"
    @click.outside="popup.visible=false">
    <div class="popup-title" x-text="popup.task?.title"></div>
    <div class="popup-meta">
      <div x-text="`Priority: ${popup.task?.priority || '—'}`"></div>
      <div x-text="`Status: ${popup.task?.status?.replace('_',' ') || '—'}`"></div>
    </div>
    <div style="display: flex;">
      <button class="btn-sm btn-sm-secondary" @click="popup.visible=false">Close</button>
      <button class="btn-sm btn-sm-primary" @click="markComplete(popup.task)">Complete</button>
    </div>
  </div>

  <!-- Quick-add modal -->
  <div class="modal-overlay" x-show="qaOpen" x-cloak x-transition @click.self="qaOpen=false">
    <div class="modal">
      <div class="modal-header">
        <h2>Schedule Quest</h2>
        <button class="close-btn" @click="qaOpen=false">✕</button>
      </div>
      <div class="modal-body">
        <div><label class="form-label">Quest Title *</label><input id="qa-title" class="form-input" type="text"
            x-model="qa.title" placeholder="What is your objective?" /></div>
        <div><label class="form-label">Difficulty (Priority)</label>
          <select id="qa-priority" class="form-input" x-model="qa.priority">
            <option value="low">Low (Easy)</option>
            <option value="medium">Medium (Normal)</option>
            <option value="high">High (Hard)</option>
            <option value="critical">Critical (Boss)</option>
          </select>
        </div>
        <div><label class="form-label">Target Date</label><input class="form-input" type="text" :value="qa.dateLabel"
            disabled style="opacity: 0.8;" /></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" @click="qaOpen=false">Cancel</button>
        <button id="qa-save" class="btn-primary" @click="quickAddTask()">Schedule</button>
      </div>
    </div>
  </div>

  <!-- Logout Confirmation Modal -->
  <div class="modal-overlay" style="z-index: 10000;" x-data="{ logoutOpen: false }" @open-logout-modal.window="logoutOpen = true" x-show="logoutOpen" x-cloak>
    <div class="modal" @click.away="logoutOpen = false" style="max-width: 400px; text-align: center; padding: 2rem;">
      <h2 style="font-size: 1.5rem; font-weight: 900; color: var(--danger); margin-bottom: 0.5rem;">Abandon Quest?</h2>
      <p style="font-size: 1rem; font-weight: 700; color: var(--muted); margin-bottom: 1.5rem;">
        "Winners never quit, and quitters never win."
      </p>
      <div style="display: flex; gap: 1rem; justify-content: center;">
        <button class="btn-ghost" @click="logoutOpen = false" style="flex: 1;">No, Stay</button>
        <button class="btn-primary" @click="logout()" style="flex: 1; background: var(--danger); border-color: var(--danger);">Yes, Exit</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6/index.global.min.js"></script>
  <script type="module">
    import { auth, tasks, showToast } from './js/api.js';

    document.addEventListener('alpine:init', () => {
      Alpine.data('calendarApp', () => ({
        user: null, darkMode: false, calInstance: null,
        popup: { visible: false, x: 0, y: 0, task: null },
        qaOpen: false, qa: { title: '', priority: 'medium', date: null, dateLabel: '' },

        async init() {
          this.darkMode = localStorage.getItem('theme') === 'dark';
          const res = await auth.me();
          if (!res?.ok) { window.location.href = 'index.html'; return; }
          this.user = res.data;
          await this.$nextTick();
          this.buildCalendar();
        },

        toggleDark() { this.darkMode = !this.darkMode; localStorage.setItem('theme', this.darkMode ? 'dark' : 'light'); },
        async logout() { await auth.logout(); window.location.href = 'index.html'; },

        async buildCalendar() {
          const res = await tasks.list();
          const allTasks = res?.ok ? res.data : [];

          const brandColor = '#8B5CF6';

          const events = allTasks
            .filter(t => t.due_date)
            .map(t => ({
              id: t.id,
              title: t.title,
              start: t.due_date,
              backgroundColor: t.status === 'done' ? '#10B981' : brandColor,
              borderColor: '#0F172A',
              opacity: t.status === 'done' ? 0.7 : 1,
              extendedProps: { task: t },
            }));

          const self = this;
          this.calInstance = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
            editable: true,
            events,
            eventClick(info) {
              const rect = info.el.getBoundingClientRect();
              self.popup = { visible: true, x: Math.min(rect.left + rect.width + 8, window.innerWidth - 320), y: rect.top + window.scrollY, task: info.event.extendedProps.task };
            },
            dateClick(info) {
              self.qa = { title: '', priority: 'medium', date: info.dateStr, dateLabel: new Date(info.dateStr + 'T00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) };
              self.qaOpen = true;
            },
            async eventDrop(info) {
              const id = info.event.id;
              const newDate = info.event.startStr;
              const res = await tasks.update(id, { due_date: newDate });
              if (res?.ok) { showToast('Due date updated', 'success'); }
              else { showToast('Update failed', 'error'); info.revert(); }
            },
          });
          this.calInstance.render();
        },

        async markComplete(task) {
          if (!task) return;
          const res = await tasks.toggleComplete(task.id);
          if (res?.ok) {
            showToast('Quest Completed!', 'success');
            this.popup.visible = false;
            // Refresh calendar
            this.calInstance.destroy();
            await this.buildCalendar();
          }
        },

        async quickAddTask() {
          if (!this.qa.title.trim()) { showToast('Title required', 'error'); return; }
          const res = await tasks.create({ title: this.qa.title, priority: this.qa.priority, due_date: this.qa.date });
          if (res?.ok) {
            showToast('Quest Scheduled!', 'success');
            this.calInstance.addEvent({ id: res.data.id, title: res.data.title, start: res.data.due_date, backgroundColor: '#8B5CF6', borderColor: '#0F172A' });
            this.qaOpen = false;
          } else { showToast('Could not schedule quest', 'error'); }
        },
      }));
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
