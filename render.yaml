# Render Blueprint for TaskFlow Pro
# This will automatically set up the API, Worker, and Beat services.

envVarGroups:
  - name: taskflow-common
    envVars:
      - key: MONGO_URI
        sync: false # You will paste your Altas URI in the dashboard
      - key: REDIS_URL
        sync: false # You will paste your Upstash URI in the dashboard
      - key: FLASK_ENV
        value: production

services:
  # 1. Main Flask API
  - type: web
    name: taskflow-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --chdir backend run:app
    envVars:
      - fromGroup: taskflow-common
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

  # 2. Celery Worker (Background Tasks)
  - type: worker
    name: taskflow-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A celery_app.celery worker --loglevel=info
    envVars:
      - fromGroup: taskflow-common

  # 3. Celery Beat (Scheduler)
  - type: worker
    name: taskflow-beat
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A celery_app.celery beat --loglevel=info
    envVars:
      - fromGroup: taskflow-common
